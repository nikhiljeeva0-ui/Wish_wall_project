<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Page</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif
      }

      body {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #e9edf3;
        overflow: hidden;
        padding: 20px;
      }

      /* LOGIN CONTAINER */

      .login-container {
        position: relative;
        width: 100%;
        max-width: 1100px;
        min-height: 650px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(12px);
        border-radius: 35px;
        overflow: hidden;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        z-index: 10;
      }

      /* LEFT SIDE */

      .left-side {
        background: linear-gradient(135deg, #009c9c, #7a00ff);
        color: white;
        padding: 60px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        position: relative;
      }

      .logo {
        position: absolute;
        top: 35px;
        left: 40px;
        font-size: 26px;
        font-weight: 700;
      }

      .left-side h1 {
        font-size: 58px;
        line-height: 1.1;
        margin-bottom: 20px;
      }

      .left-side p {
        font-size: 20px;
        line-height: 1.7;
        color: rgba(255, 255, 255, 0.9);
        max-width: 450px;
      }

      .tags {
        display: flex;
        gap: 15px;
        flex-wrap: wrap;
        margin-top: 35px;
      }

      .tag {
        padding: 12px 22px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.18);
        border: 1px solid rgba(255, 255, 255, 0.2);
        font-size: 15px;
      }

      /* RIGHT SIDE */

      .right-side {
        background: #ffffff;
        padding: 70px 60px;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }

      .login-header h2 {
        font-size: 42px;
        color: #111;
        margin-bottom: 10px;
      }

      .login-header p {
        color: #777;
        font-size: 16px;
      }

      .input-group {
        margin-bottom: 22px;
      }

      .input-group label {
        display: block;
        margin-bottom: 10px;
        font-size: 15px;
        color: #444;
        font-weight: 500;
      }

      .input-group input {
        width: 100%;
        padding: 18px;
        border: none;
        border-radius: 16px;
        background: #f2f5fa;
        font-size: 16px;
        outline: none;
        transition: 0.3s;
      }

      .input-group input:focus {
        background: #e8eefc;
        border: 2px solid #7a00ff;
      }

      .options {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 30px;
        font-size: 14px;
        color: #666;
      }

      .options a {
        text-decoration: none;
        color: #7a00ff;
        font-weight: 500;
      }

      .login-btn {
        width: 100%;
        padding: 18px;
        border: none;
        border-radius: 18px;
        background: linear-gradient(135deg, #009c9c, #7a00ff);
        color: white;
        font-size: 18px;
        font-weight: 600;
        cursor: pointer;
        transition: 0.3s;
      }

      .login-btn:hover {
        transform: translateY(-2px);
        opacity: 0.95;
      }

      .divider {
        text-align: center;
        margin: 30px 0;
        color: #999;
        position: relative;
      }

      .divider::before,
      .divider::after {
        content: "";
        position: absolute;
        width: 40%;
        height: 1px;
        background: #ddd;
        top: 50%;
      }

      .divider::before {
        left: 0;
      }

      .divider::after {
        right: 0;
      }

      .social-login {
        display: flex;
        gap: 15px;
      }

      .social-btn {
        flex: 1;
        padding: 16px;
        border: none;
        border-radius: 14px;
        background: #f2f5fa;
        cursor: pointer;
        font-size: 15px;
        font-weight: 500;
        transition: 0.3s;
      }

      .social-btn:hover {
        background: #e8eefc;
      }

      .signup {
        text-align: center;
        margin-top: 35px;
        color: #666;
        font-size: 15px;
      }

      .signup a {
        color: #7a00ff;
        text-decoration: none;
        font-weight: 600;
      }

      @media (max-width: 950px) {
        .login-container {
          grid-template-columns: 1fr;
        }

        .left-side {
          display: none;
        }

        .right-side {
          padding: 50px 30px;
        }
      }
    </style>
  </head>

  <body>
    <div class="login-container">
      <!-- LEFT SECTION -->

      <div class="left-side">
        <div class="logo">✨ Garuda WishWall</div>

        <h1>
          Welcome<br />
          Back
        </h1>

        <p>
          Share your dreams, connect with creative people, and explore amazing
          wishes from around the world.
        </p>

        <div class="tags">
          <div class="tag">#frontend</div>
          <div class="tag">#tech</div>
          <div class="tag">#ideas</div>
          <div class="tag">#motivation</div>
          <div class="tag">#backend</div>
        </div>
      </div>

      <!-- RIGHT SECTION -->

      <div class="right-side">
        <div class="login-header">
          <h2>Login</h2>
          <p>Please login to continue</p>
        </div>

        <div class="input-group">
          <label>Email Address</label>
          <input type="email" id="email" placeholder="Enter your email" />
        </div>

        <div class="input-group">
          <label>Password</label>
          <input
            type="password"
            id="password"
            placeholder="Enter your password"
          />
        </div>

        <div class="options">
          <label>
            <input type="checkbox" />
            Remember me
          </label>

          <a href="#">Forgot Password?</a>
        </div>

        <button class="login-btn" onclick="login()">Login</button>

        <div class="divider">OR</div>

        <div class="social-login">
          <button class="social-btn">Google</button>
          <button class="social-btn">facebook</button>
        </div>

        <div class="signup">
          Don’t have an account?
          <a href="#">Create Account</a>
        </div>
      </div>
    </div>

    <script>
      function login() {
        let email = document.getElementById("email").value;
        let password = document.getElementById("password").value;

        if (email === "" || password === "") {
          alert("Please fill all fields");
        } else {
          alert("Login Successful");
        }
      }
    </script>
  </body>
</html>

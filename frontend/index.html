<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garuda WishWall</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="layout-container">
        
        <!-- LEFT SIDEBAR (12% width) -->
        <nav class="sidebar">
            <div class="logo-box">
                <i class="bi bi-balloon-heart-fill"></i>
            </div>
            <div class="nav-links">
                <a href="index.html" class="nav-item active" title="Home">
                    <i class="bi bi-house-door"></i>
                </a>
                <a href="explore.html" class="nav-item" title="Explore">
                    <i class="bi bi-compass"></i>
                </a>
                <a href="#" class="nav-item" title="Bookmarks">
                    <i class="bi bi-bookmark"></i>
                </a>
                <a href="notifications.html" class="nav-item" title="Notifications">
                    <i class="bi bi-bell"></i>
                </a>
                <a href="profile.html" class="nav-item" title="Profile">
                    <i class="bi bi-person"></i>
                </a>
                <a href="newwish.html" class="nav-item" title="New Wish">
                    <i class="bi bi-pencil-square"></i>
                </a>
                <a href="edit-profile.html" class="nav-item" title="Settings">
                    <i class="bi bi-gear"></i>
                </a>
                <a href="#" class="nav-item" id="logout-btn" title="Logout">
                    <i class="bi bi-box-arrow-right"></i>
                </a>
            </div>
            <div class="profile-icon">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Aisha" alt="User">
            </div>
        </nav>

        <!-- CENTER FEED (58% width) -->
        <main class="feed-container" id="main-content">
            <!-- Top Search Bar -->
            <div class="header-box">
                <div class="search-wrap">
                    <i class="bi bi-search"></i>
                    <input id="home-search" type="search" placeholder="Search wishes, tags, people...">
                </div>
                <div class="tab-wrap">
                    <button class="top-tab active">For You</button>
                    <button class="top-tab">Latest</button>
                    <button class="top-tab">Popular</button>
                </div>
            </div>

            <!-- Composer Box -->
            <div class="composer box">
                <div class="composer-top">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Aisha" class="avatar-sm" alt="User">
                    <textarea id="wish-textarea" placeholder="What's your wish today?" rows="1"></textarea>
                </div>

                <div class="mood-bar">
                    <span class="mood-title">Mood:</span>
                    <div class="mood-options">
                        <!-- JS classes preserved exactly: mood-tag, data-mood, data-color -->
                        <button class="mood-tag active" data-mood="Dreaming" data-color="purple">✨ Dreaming</button>
                        <button class="mood-tag" data-mood="Hustle" data-color="pink">🔥 Hustle</button>
                        <button class="mood-tag" data-mood="Love" data-color="red">💖 Love</button>
                        <button class="mood-tag" data-mood="Travel" data-color="blue">🌍 Travel</button>
                        <button class="mood-tag" data-mood="Startup" data-color="orange">🚀 Startup</button>
                        <button class="mood-tag" data-mood="Goals" data-color="green">🎯 Goals</button>
                    </div>
                </div>

                <div class="composer-bottom">
                    <div class="anon-tools">
                        <input type="text" id="name-input" class="input-light" placeholder="Name (optional)" />
                        <label class="anon-label">
                            <input type="checkbox" id="anon-toggle">
                            <span>Anonymous</span>
                        </label>
                        <span class="count">0/280</span>
                    </div>
                    <div class="action-tools">
                        <button class="icon-action"><i class="bi bi-image"></i></button>
                        <button class="btn-post" id="send-wish-btn">Post Wish</button>
                    </div>
                </div>
            </div>

            <!-- Feed Posts -->
            <div id="posts-container"></div>
            <div class="feed-footer">No more wishes to show!</div>
        </main>

        <!-- RIGHT SIDEBAR (30% width) -->
        <aside class="right-sidebar">
            <div class="widget feat-widget box">
                <div class="feat-header">
                    <i class="bi bi-star-fill star-icon"></i>
                    <span class="feat-title">Featured Wish</span>
                </div>
                <p class="feat-desc">"May every person here find the courage to chase their one true wish this year."</p>
                <button class="btn-link">Join Thread</button>
            </div>

            <div class="widget box">
                <span class="widget-header">Trending Tags</span>
                <div class="tag-cloud">
                    <span class="trend-tag">#startup2026</span>
                    <span class="trend-tag">#motivation</span>
                    <span class="trend-tag">#tech</span>
                    <span class="trend-tag">#love</span>
                    <span class="trend-tag">#career</span>
                </div>
            </div>

            <div class="site-links">
                <a href="#">Privacy</a>
                <a href="#">Terms</a>
                <a href="#">Support</a>
                <p>© 2026 Garuda WishWall</p>
            </div>
        </aside>

        <!-- Mobile Post FAB -->
        <button class="mobile-fab" id="mobile-post-btn">
            <i class="bi bi-plus-lg"></i>
        </button>
    </div>

    <script src="config.js"></script>
    <script src="auth.js"></script>
    <script src="script.js"></script>
</body>
</html>

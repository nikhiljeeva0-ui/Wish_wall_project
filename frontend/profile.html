<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Garuda WishWall</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="profile.css">
</head>
<body>
    <div class="layout-container">
        <!-- LEFT SIDEBAR -->
        <nav class="sidebar">
            <div class="logo-box"><i class="bi bi-balloon-heart-fill"></i></div>
                        <div class="nav-links">
                <a href="index.html" class="nav-item" title="Home">
                    <i class="bi bi-house-door"></i>
                </a>
                <a href="explore.html" class="nav-item" title="Explore">
                    <i class="bi bi-compass"></i>
                </a>
                <a href="#" class="nav-item" title="Bookmarks">
                    <i class="bi bi-bookmark"></i>
                </a>
                <a href="notifications.html" class="nav-item" title="Notifications">
                    <i class="bi bi-bell"></i>
                </a>
                <a href="profile.html" class="nav-item active" title="Profile">
                    <i class="bi bi-person"></i>
                </a>
                <a href="newwish.html" class="nav-item" title="New Wish">
                    <i class="bi bi-pencil-square"></i>
                </a>
                <a href="edit-profile.html" class="nav-item" title="Settings">
                    <i class="bi bi-gear"></i>
                </a>
                <a href="#" class="nav-item" id="logout-btn" title="Logout">
                    <i class="bi bi-box-arrow-right"></i>
                </a>
            </div>
            <div class="profile-icon">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Aisha" alt="User">
            </div>
        </nav>

        <!-- CENTER FEED -->
        <main class="feed-container">
            <div class="profile-box box">
                <div class="cover-banner"></div>
                <div class="profile-info-wrap">
                    <div class="profile-top-row">
                        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Aisha" class="profile-avatar-large" alt="User">
                        <a href="edit-profile.html" class="btn-edit-profile" style="text-decoration:none; display:inline-flex; align-items:center;">Edit Profile</a>
                    </div>
                    <div class="profile-details">
                        <h2 class="profile-name">Aisha Sharma</h2>
                        <span class="profile-username">@aisha_dreams</span>
                        <p class="profile-bio">Chasing dreams, building startups, and loving life. Sharing my journey one wish at a time! ✨🚀</p>
                        <div class="profile-stats">
                            <div class="stat-box"><span class="stat-num">0</span> Wishes</div>
                            <div class="stat-box"><span class="stat-num">0</span> Followers</div>
                            <div class="stat-box"><span class="stat-num">0</span> Following</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="profile-tabs box">
                <button class="p-tab active" data-tab="wishes">My Wishes</button>
                <button class="p-tab" data-tab="saved">Saved</button>
                <button class="p-tab" data-tab="liked">Liked</button>
            </div>

            <div id="wishes-tab" class="tab-content active-tab">
                <div id="profilePosts"></div>
            </div>

            <div id="saved-tab" class="tab-content">
                <div class="feed-footer">No saved wishes yet.</div>
            </div>

            <div id="liked-tab" class="tab-content">
                <div class="feed-footer">No liked wishes yet.</div>
            </div>
        </main>

        <!-- RIGHT SIDEBAR -->
        <aside class="right-sidebar">
            <div class="widget box">
                <span class="widget-header">Similar Profiles</span>
                <div class="user-list"></div>
            </div>
        </aside>
    </div>
    <script src="config.js"></script>
    <script src="auth.js"></script>
    <script src="profile.js"></script>
</body>
</html>
